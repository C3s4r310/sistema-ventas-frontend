<div class="productos-wrapper">
  <div class="productos-header">
    <div>
      <span class="eyebrow">Inventario</span>
      <h2>Gestión de Productos</h2>
      <p>Administra los productos, precios, imágenes y categorías de la tienda.</p>
    </div>

    <button mat-raised-button class="btn-add" (click)="abrirModalProducto()">
      <mat-icon>add</mat-icon>
      Añadir Producto
    </button>
  </div>

  <mat-card class="productos-card">
    <div class="acciones">
      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input
          [(ngModel)]="textoBusqueda"
          (keyup)="aplicarFiltroCompuesto()"
          placeholder="Buscar producto..." />
      </div>

      <select
        class="select-category"
        [(ngModel)]="categoriaSeleccionada"
        (change)="aplicarFiltroCompuesto()">
        <option *ngFor="let cat of categorias" [value]="cat">
          {{ cat }}
        </option>
      </select>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="tabla-productos">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let product">{{ product.id }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Producto</th>
          <td mat-cell *matCellDef="let product" class="product-name">
            {{ product.name }}
          </td>
        </ng-container>

        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef>Precio</th>
          <td mat-cell *matCellDef="let product" class="price">
            S/ {{ product.price }}
          </td>
        </ng-container>

        <ng-container matColumnDef="image">
          <th mat-header-cell *matHeaderCellDef>Imagen</th>
          <td mat-cell *matCellDef="let product">
            <img [src]="product.image" class="imagen">
          </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let product" class="description">
            {{ product.description }}
          </td>
        </ng-container>

        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Categoría</th>
          <td mat-cell *matCellDef="let product">
            <span class="category-badge">{{ product.category }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let product">
            <button mat-icon-button class="btn-edit" (click)="abrirModalProducto(product)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button class="btn-delete" (click)="eliminar(product)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
